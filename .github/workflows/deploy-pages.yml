name: Deploy PWA to GitHub Pages

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

env:
  CI: true
  VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
  VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Verify and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6

      - name: Set up Node.js LTS
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Verify public Supabase configuration
        shell: bash
        run: |
          if [[ -z "${VITE_SUPABASE_URL:-}" || -z "${VITE_SUPABASE_PUBLISHABLE_KEY:-}" ]]; then
            echo "Repository variables VITE_SUPABASE_URL and VITE_SUPABASE_PUBLISHABLE_KEY are required."
            exit 1
          fi
          if [[ "$VITE_SUPABASE_URL" != https://* ]]; then
            echo "VITE_SUPABASE_URL must use HTTPS."
            exit 1
          fi
          if [[ "$VITE_SUPABASE_URL" == *"replace_me"* || "$VITE_SUPABASE_PUBLISHABLE_KEY" == *"replace_me"* ]]; then
            echo "Supabase repository variables still contain placeholder values."
            exit 1
          fi
          if [[ "$VITE_SUPABASE_PUBLISHABLE_KEY" == sb_secret_* || "$VITE_SUPABASE_PUBLISHABLE_KEY" == sbp_* ]]; then
            echo "A Supabase server secret cannot be exposed through a VITE_ variable."
            exit 1
          fi

      - name: Scan repository for committed secrets
        run: node scripts/scan-release.mjs --source .

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build production PWA
        run: npm run build

      - name: Scan production bundle for secrets and local endpoints
        run: node scripts/scan-release.mjs --release dist

      - name: Verify release artifact
        shell: bash
        run: |
          test -s dist/index.html
          test -s dist/manifest.webmanifest
          test -s dist/sw.js
          test -s dist/icons/icon-192.png
          test -s dist/icons/icon-512.png
          node -e "JSON.parse(require('node:fs').readFileSync('dist/manifest.webmanifest', 'utf8'))"
          ! grep -Fq "const BUILD_ID = 'dev'" dist/sw.js
          ! grep -Fq "const BUILD_ASSETS = []" dist/sw.js

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
