name: Deploy PWA to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

env:
  CI: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Verify and build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Set up Node.js LTS
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build production PWA
        run: npm run build

      - name: Verify release artifact
        shell: bash
        run: |
          test -s dist/index.html
          test -s dist/manifest.webmanifest
          test -s dist/sw.js
          test -s dist/icons/icon-192.png
          test -s dist/icons/icon-512.png
          node -e "JSON.parse(require('node:fs').readFileSync('dist/manifest.webmanifest', 'utf8'))"
          ! grep -Fq "const BUILD_ID = 'dev'" dist/sw.js
          ! grep -Fq "const BUILD_ASSETS = []" dist/sw.js

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
